<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
</head>
<body>
    <h1>Exercício 3</h1>
    <script>

        function validarEntrada(valor, nomeCampo) {
            while (isNaN(valor) || valor <= 0) {
                alert(`Valor de ${nomeCampo} inválido. Por favor, insira um número válido.`);
                valor = parseFloat(prompt(`Informe novamente o valor do campo de ${nomeCampo}? `));
            }
            return valor;
        }
        let distancia = parseFloat(prompt(`Qual a distância percorrida de sua casa até seu trabalho (em km)? `));
        distancia = validarEntrada(distancia, "distância");

        let consumoMedio = parseFloat(prompt(`Qual o consumo médio do seu carro (em km/L)? `));
        consumoMedio = validarEntrada(consumoMedio, "consumo médio");
        let consumoNecessarioLitros = distancia /consumoMedio;
        document.writeln(`O consumo necessário é ${consumoNecessarioLitros} litros`);

        let qtdPostos = parseInt(prompt(`Quantos postos você pesquisou? `));
        qtdPostos = validarEntrada(qtdPostos, "quantidade de postos");
        let menorPreco = Infinity;
        let somaTotal = 0;
        for(let i = 1; qtdPostos >= i; i++){
            let precoCombustivel = parseFloat(prompt(`Digite o valor (em R$) no posto ${i} `));
            precoCombustivel = validarEntrada(precoCombustivel, `preço do posto ${i}`);
            somaTotal += precoCombustivel;
            if(precoCombustivel < menorPreco){
                menorPreco = precoCombustivel;
            }
        }
        let media = somaTotal / qtdPostos;
        let gastoDiario = 2*(consumoNecessarioLitros * menorPreco);
        document.writeln(`<br>O menor valor pesquisado é: R$ ${menorPreco}`);
        document.writeln(`<br>A média dos valores pesquisados é: R$ ${media}`);
        document.writeln(`<br>O gasto diário (ida e volta) é: R$ ${gastoDiario}`);
    </script>
</body>
</html>
