<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FordEnter</title>
    <link rel="stylesheet" href="/ford_presentation/styles/lancamento.css">
    <link rel="icon" type="image/png" href="/ford_presentation/img/ford-96.png">
</head>
<body>
    <header>    
        <div class="menu-bar">
            <img src="/ford_presentation/img/logo-ford-256.png" alt="Logo Ford">
            <nav class="menu">
                <ul>
                    <a href="homePage.html">Home</a>
                    <a href="lancamento.html">Lançamento</a>
                    <a href="contato.html">Contato</a>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/O4HDr2oldM8?autoplay=1&mute=1&loop=1&playlist=O4HDr2oldM8"
                title="Ford Ranger Black 2022" 
                frameborder="0" 
                allow="accelerometer; autoplay" 
                allowfullscreen>>
            </iframe>
        </div>
        <div class="products-container">
            <div class="product-card">
                <img src="/ford_presentation/img/storm.jpg" alt="produto1" class="product-image">
                <div class="product-content">
                    <div class="checkbox-text-wrapper">
                        <input type="checkbox" name="comparar" id="comparar-1">
                        <label for="comparar-1">
                            <div class="text-info">
                                <h1 class="product-title">Ranger Storm 2022</h1>
                                <p class="product-description">Preço a partir de R$ 150.000,00</p>
                            </div>
                        </label>
                    </div>
                    <img src="/ford_presentation/img/info.png" alt="Informacoes" class="info-icon">
                </div>
            </div>
            <div class="product-card">
                <img src="/ford_presentation/img/XL Cabine.jpg" alt="produto2" class="product-image">
                <div class="product-content">
                    <div class="checkbox-text-wrapper">
                        <input type="checkbox" name="comparar" id="comparar-2">
                        <label for="comparar-2">
                            <div class="text-info">
                                <h1 class="product-title">Ranger XL Cabine 2022</h1>
                                <p class="product-description">Preço a partir de R$ 160.000,00</p>
                            </div>
                        </label>
                    </div>
                    <img src="/ford_presentation/img/info.png" alt="Informacoes" class="info-icon">
                </div>
            </div>
            <div class="product-card">
                <img src="/ford_presentation/img/storm.jpg" alt="produto1" class="product-image">
                <div class="product-content">
                    <div class="checkbox-text-wrapper">
                        <input type="checkbox" name="comparar" id="comparar-3">
                        <label for="comparar-3">
                            <div class="text-info">
                                <h1 class="product-title">Ranger Storm 2022</h1>
                                <p class="product-description">Preço a partir de R$ 180.000,00</p>
                            </div>
                        </label>
                    </div>
                    <img src="/ford_presentation/img/info.png" alt="Informacoes" class="info-icon">
                </div>
            </div>
        </div>
        <button class="button">Comparar Carros</button>
    </main>
    <footer>
        <div class="social-media">
            
            <nav>
                <ul>
                    <p>Redes Sociais:</p>
                    <a href="https://www.facebook.com/FordBrasil/"><img src="/ford_presentation/img/facebook-50.png" alt="Facebook"></a>
                    <a href="https://www.youtube.com/@ford"><img src="/ford_presentation/img/youtube-squared-50.png" alt="Youtube"></a>
                    <a href="https://www.instagram.com/ford/"><img src="/ford_presentation/img/instagram-logo-50.png" alt="Instagram"></a>
                </ul>
            </nav>
        </div>
        <div class="copyright">
            <p>© 2026 Ford Brasil Ltda. Todos os direitos reservados.</p>
        </div>
        <div class="logo-footer">
            <img src="/ford_presentation/img/ford-96.png" alt="Logo Ford">
        </div>
    </footer>
</body>
</html>
